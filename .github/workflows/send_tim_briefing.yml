name: TIM Briefing - Invio settimanale

on:
  workflow_dispatch:
    inputs:
      subject:
        description: "Oggetto email"
        required: true
      html_body:
        description: "Corpo HTML email"
        required: true
      email_to:
        description: "Destinatario"
        required: true
        default: "taglientim@yahoo.it"

jobs:
  send-tim-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Invia email TIM briefing
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          EMAIL_TO: ${{ github.event.inputs.email_to }}
          SUBJECT: ${{ github.event.inputs.subject }}
          HTML_BODY: ${{ github.event.inputs.html_body }}
        run: |
          python3 -c "
import smtplib, ssl, os
from email.mime.multipart import MIMEMultipart
from email.mime.text import MIMEText
msg = MIMEMultipart('alternative')
msg['From'] = os.environ['GMAIL_USER']
msg['To'] = os.environ['EMAIL_TO']
msg['Subject'] = os.environ['SUBJECT']
msg.attach(MIMEText(os.environ['HTML_BODY'], 'html', 'utf-8'))
ctx = ssl.create_default_context()
with smtplib.SMTP_SSL('smtp.gmail.com', 465, context=ctx) as s:
    s.login(os.environ['GMAIL_USER'], os.environ['GMAIL_APP_PASS'])
    s.sendmail(os.environ['GMAIL_USER'], os.environ['EMAIL_TO'], msg.as_string())
print('Email inviata a ' + os.environ['EMAIL_TO'])
"